name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Desktop (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EnviroAnalyzer Pro ${{ github.ref_name }}'
          releaseBody: |
            ## EnviroAnalyzer Pro ${{ github.ref_name }}

            ### Downloads
            - **Windows Installer (.exe)** — Full desktop app with R sidecar support
            - **Web Standalone (.zip)** — Browser-only version (see web build below)

            ### Requirements
            - Windows 10/11
            - [R](https://cran.r-project.org/) (optional, for forecasting & kriging features)
          releaseDraft: false
          prerelease: false

  build-web:
    name: Build Web Standalone
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Package standalone web
        run: |
          cd dist
          zip -r ../enviroanalyzer-web-standalone.zip .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: enviroanalyzer-web-standalone.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
